<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Game Story Anti-Bullying</title>
  <style>
    :root {
      --bg: #0f1220;
      --panel: rgba(20, 24, 40, 0.92);
      --panel2: rgba(34, 40, 66, 0.96);
      --text: #f2f5ff;
      --muted: #b8c0e0;
      --accent: #7dd3fc;
      --good: #34d399;
      --bad: #fb7185;
      --warn: #fbbf24;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
    }* { box-sizing: border-box; }
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at top, #18203d, #0a0d18 70%);
  color: var(--text);
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  overflow: hidden;
  touch-action: manipulation;
}

#app {
  position: relative;
  width: 100vw;
  height: 100vh;
  display: grid;
  grid-template-rows: 1fr auto;
}

#worldWrap {
  position: relative;
  overflow: hidden;
  min-height: 0;
}

#world {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(to bottom, rgba(255,255,255,0.08), rgba(255,255,255,0) 24%),
    linear-gradient(to bottom, #8fd3ff 0%, #b7e4ff 35%, #d8f3ff 36%, #d7f0c9 36%, #d7f0c9 100%);
}

#clouds {
  position: absolute;
  inset: 0;
  pointer-events: none;
  opacity: 0.55;
  background-image:
    radial-gradient(circle at 10% 16%, rgba(255,255,255,0.9) 0 3.2%, transparent 3.3%),
    radial-gradient(circle at 14% 16.5%, rgba(255,255,255,0.9) 0 3.8%, transparent 3.9%),
    radial-gradient(circle at 18% 16%, rgba(255,255,255,0.9) 0 3.2%, transparent 3.3%),
    radial-gradient(circle at 72% 12%, rgba(255,255,255,0.9) 0 3.0%, transparent 3.1%),
    radial-gradient(circle at 77% 12.5%, rgba(255,255,255,0.9) 0 3.7%, transparent 3.8%),
    radial-gradient(circle at 81% 12%, rgba(255,255,255,0.9) 0 3.0%, transparent 3.1%);
  filter: blur(1px);
  transform: translateZ(0);
}

#ground {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 26%;
  background: linear-gradient(to bottom, #6cc06a, #4ca04e 60%, #3a7f3c 100%);
  border-top: 4px solid rgba(255,255,255,0.14);
}

.lane {
  position: absolute;
  left: 0; right: 0;
  bottom: 26%;
  height: 4px;
  background: repeating-linear-gradient(
    to right,
    rgba(255,255,255,0.0) 0 28px,
    rgba(255,255,255,0.85) 28px 56px
  );
  opacity: 0.4;
}

.building {
  position: absolute;
  bottom: 26%;
  width: 18vw;
  min-width: 170px;
  max-width: 240px;
  height: 34vh;
  background: linear-gradient(to bottom, #edf2ff, #dbe4ff);
  border: 5px solid rgba(45, 55, 96, 0.55);
  border-bottom-width: 10px;
  border-radius: 14px 14px 6px 6px;
  box-shadow: var(--shadow);
}

.school { left: 8vw; }
.school::before {
  content: 'SEKOLAH';
  position: absolute;
  top: -34px;
  left: 50%;
  transform: translateX(-50%);
  padding: 6px 14px;
  border-radius: 999px;
  background: rgba(20, 24, 40, 0.8);
  color: white;
  font-weight: 800;
  letter-spacing: 1px;
  font-size: 12px;
}

.school .roof {
  position: absolute;
  left: -6%; right: -6%; top: -22px;
  height: 22px;
  background: linear-gradient(135deg, #6b7cff, #4c5cde);
  clip-path: polygon(0% 100%, 50% 0%, 100% 100%);
}

.school .window {
  position: absolute;
  width: 22%;
  height: 15%;
  background: linear-gradient(to bottom, #9de0ff, #4eaeea);
  border: 3px solid rgba(45,55,96,0.5);
  border-radius: 8px;
  box-shadow: inset 0 0 0 3px rgba(255,255,255,0.16);
}
.school .w1 { left: 18%; top: 24%; }
.school .w2 { left: 58%; top: 24%; }
.school .w3 { left: 18%; top: 50%; }
.school .w4 { left: 58%; top: 50%; }

.school .door {
  position: absolute;
  width: 24%;
  height: 26%;
  left: 38%; bottom: 0;
  background: linear-gradient(to bottom, #7a5330, #4f3219);
  border: 4px solid rgba(45,55,96,0.55);
  border-bottom: 0;
  border-radius: 12px 12px 0 0;
}

.house {
  position: absolute;
  bottom: 26%;
  right: 10vw;
  width: 14vw;
  min-width: 150px;
  max-width: 210px;
  height: 24vh;
  background: linear-gradient(to bottom, #fff0d8, #ffe0aa);
  border: 5px solid rgba(90, 71, 36, 0.55);
  box-shadow: var(--shadow);
  border-radius: 12px 12px 8px 8px;
}
.house::before {
  content: 'RUMAH';
  position: absolute;
  top: -30px;
  left: 50%;
  transform: translateX(-50%);
  padding: 4px 12px;
  border-radius: 999px;
  background: rgba(20, 24, 40, 0.8);
  color: #fff;
  font-size: 12px;
  font-weight: 800;
}
.house .roof {
  position: absolute;
  left: -8%; right: -8%; top: -18px;
  height: 18px;
  background: linear-gradient(135deg, #ff8c6f, #cc5a43);
  clip-path: polygon(0% 100%, 50% 0%, 100% 100%);
}
.house .door {
  position: absolute;
  width: 28%; height: 42%;
  left: 36%; bottom: 0;
  background: linear-gradient(to bottom, #7b4f2b, #4c2f19);
  border-radius: 10px 10px 0 0;
  border: 4px solid rgba(90, 71, 36, 0.55);
  border-bottom: 0;
}

.npc, .player {
  position: absolute;
  bottom: calc(26% + 3px);
  width: 42px;
  height: 58px;
  transform: translateX(-50%);
  filter: drop-shadow(0 8px 12px rgba(0,0,0,.22));
  z-index: 5;
}

.player::before, .npc::before {
  content: '';
  position: absolute;
  left: 50%; top: 0;
  width: 24px; height: 24px;
  transform: translateX(-50%);
  border-radius: 50%;
  background: #ffd7b3;
  border: 2px solid rgba(0,0,0,0.15);
}
.player::after, .npc::after {
  content: '';
  position: absolute;
  left: 50%; top: 20px;
  width: 28px; height: 30px;
  transform: translateX(-50%);
  border-radius: 10px 10px 12px 12px;
  background: #4f7cff;
  border: 2px solid rgba(0,0,0,0.12);
}
.npc::after { background: #ef4444; }
.npc.friend::after { background: #10b981; }
.npc.pemantik::after { background: #8b5cf6; }

.label {
  position: absolute;
  top: -24px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  white-space: nowrap;
  padding: 4px 8px;
  background: rgba(15,18,32,0.8);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 999px;
  color: #fff;
  font-weight: 700;
}

.bubble {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  bottom: 82px;
  min-width: 220px;
  max-width: min(92vw, 520px);
  padding: 14px 16px;
  border-radius: 18px;
  background: var(--panel);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: var(--shadow);
  z-index: 20;
  display: none;
}
.bubble.show { display: block; }
.bubble .speaker { font-weight: 800; color: var(--accent); margin-bottom: 6px; }
.bubble .text { line-height: 1.45; color: var(--text); white-space: pre-wrap; }
.bubble .hint { margin-top: 10px; color: var(--muted); font-size: 12px; }

#ui {
  position: relative;
  background: linear-gradient(to bottom, rgba(10,13,24,0.02), rgba(10,13,24,0.68));
  backdrop-filter: blur(10px);
  border-top: 1px solid rgba(255,255,255,0.08);
  padding: 12px;
  display: grid;
  gap: 10px;
}

#hud {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}

#titleBox {
  display: grid;
  gap: 4px;
}
#titleBox h1 {
  margin: 0;
  font-size: clamp(18px, 2.8vw, 26px);
  line-height: 1.1;
}
#titleBox p {
  margin: 0;
  color: var(--muted);
  font-size: 13px;
}

#status {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: flex-end;
}
.pill {
  background: rgba(255,255,255,0.09);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 8px 10px;
  border-radius: 999px;
  font-size: 12px;
  color: #fff;
}
.pill strong { color: white; }

#dialoguePanel {
  background: var(--panel2);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 14px;
  box-shadow: var(--shadow);
}

#dialogueTop {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: start;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
#speakerName {
  font-weight: 900;
  color: var(--accent);
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
#sceneName {
  font-size: 13px;
  color: var(--muted);
}

#dialogueText {
  font-size: clamp(15px, 2.2vw, 18px);
  line-height: 1.55;
  white-space: pre-wrap;
  margin-bottom: 12px;
  min-height: 4.8em;
}

#choices {
  display: grid;
  gap: 10px;
}

button.choice, button.ctrl, button.nav {
  border: 0;
  border-radius: 16px;
  color: white;
  font-weight: 800;
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: transform .08s ease, opacity .2s ease, box-shadow .2s ease;
}
button.choice:active, button.ctrl:active, button.nav:active { transform: scale(0.98); }

button.choice {
  text-align: left;
  padding: 14px 14px;
  background: linear-gradient(180deg, rgba(125,211,252,0.24), rgba(59,130,246,0.18));
  border: 1px solid rgba(125,211,252,0.25);
  box-shadow: 0 10px 22px rgba(0,0,0,0.16);
  font-size: 14px;
}
button.choice:hover { opacity: 0.98; }
button.choice.good { background: linear-gradient(180deg, rgba(52,211,153,0.30), rgba(16,185,129,0.18)); border-color: rgba(52,211,153,0.35); }
button.choice.warn { background: linear-gradient(180deg, rgba(251,191,36,0.30), rgba(245,158,11,0.16)); border-color: rgba(251,191,36,0.35); }
button.choice.bad { background: linear-gradient(180deg, rgba(251,113,133,0.30), rgba(239,68,68,0.16)); border-color: rgba(251,113,133,0.35); }

#controls {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}

.ctrlGroup { display: flex; gap: 10px; align-items: center; }
button.ctrl, button.nav {
  min-width: 56px;
  min-height: 56px;
  padding: 12px 16px;
  font-size: 18px;
  background: rgba(255,255,255,0.09);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 12px 20px rgba(0,0,0,.18);
}

button.nav {
  min-width: auto;
  min-height: 42px;
  font-size: 14px;
  padding: 10px 14px;
  background: rgba(125,211,252,0.16);
  border-color: rgba(125,211,252,0.18);
}

#message {
  color: var(--muted);
  font-size: 12px;
  min-height: 1.2em;
}

.hidden { display: none !important; }

@media (max-width: 640px) {
  .building { min-width: 130px; }
  .bubble { min-width: 180px; }
  #ui { padding: 10px; gap: 8px; }
  button.choice { font-size: 13px; }
  #dialogueText { min-height: 5.5em; }
}

  </style>
</head>
<body>
  <div id="app">
    <div id="worldWrap">
      <div id="world">
        <div id="clouds"></div>
        <div class="building school" id="school">
          <div class="roof"></div>
          <div class="window w1"></div><div class="window w2"></div>
          <div class="window w3"></div><div class="window w4"></div>
          <div class="door"></div>
        </div>
        <div class="house" id="house">
          <div class="roof"></div>
          <div class="door"></div>
        </div>
        <div class="lane"></div>
        <div id="player" class="player"><div class="label">Kamu</div></div>
        <div id="bully" class="npc"><div class="label">Pembully</div></div>
        <div id="friend" class="npc friend"><div class="label">Sahabat</div></div>
        <div id="pemantik" class="npc pemantik"><div class="label">Pemantik</div></div>
        <div id="bubble" class="bubble">
          <div class="speaker" id="bubbleSpeaker"></div>
          <div class="text" id="bubbleText"></div>
          <div class="hint" id="bubbleHint">Tekan Z / Enter / ketuk dialog untuk lanjut.</div>
        </div>
      </div>
    </div><div id="ui">
  <div id="hud">
    <div id="titleBox">
      <h1>Jangan Diam</h1>
      <p>Game story anti-bullying. Gerak kiri/kanan, temui NPC, pilih jalan cerita.</p>
    </div>
    <div id="status">
      <div class="pill">Scene: <strong id="scenePill">Awal</strong></div>
      <div class="pill">Langkah: <strong id="stepPill">0</strong></div>
    </div>
  </div>

  <div id="dialoguePanel">
    <div id="dialogueTop">
      <div>
        <div id="speakerName">Narator</div>
        <div id="sceneName">Jalan cerita interaktif</div>
      </div>
      <div>
        <button class="nav" id="restartBtn">Restart</button>
      </div>
    </div>
    <div id="dialogueText"></div>
    <div id="choices"></div>
  </div>

  <div id="controls">
    <div class="ctrlGroup">
      <button class="ctrl" id="leftBtn">◀</button>
      <button class="ctrl" id="rightBtn">▶</button>
    </div>
    <div class="ctrlGroup">
      <button class="nav" id="interactBtn">Interaksi</button>
      <button class="nav" id="nextBtn">Lanjut</button>
    </div>
  </div>
  <div id="message"></div>
</div>

  </div>  <script>
    const world = document.getElementById('world');
    const playerEl = document.getElementById('player');
    const bullyEl = document.getElementById('bully');
    const friendEl = document.getElementById('friend');
    const pemantikEl = document.getElementById('pemantik');
    const bubbleEl = document.getElementById('bubble');
    const bubbleSpeaker = document.getElementById('bubbleSpeaker');
    const bubbleText = document.getElementById('bubbleText');
    const bubbleHint = document.getElementById('bubbleHint');
    const dialogueText = document.getElementById('dialogueText');
    const speakerName = document.getElementById('speakerName');
    const sceneName = document.getElementById('sceneName');
    const choicesEl = document.getElementById('choices');
    const messageEl = document.getElementById('message');
    const scenePill = document.getElementById('scenePill');
    const stepPill = document.getElementById('stepPill');

    const state = {
      x: 12,
      speed: 2.8,
      moving: 0,
      scene: 'intro',
      step: 0,
      inDialogue: false,
      dialogueIndex: 0,
      currentLines: [],
      currentSpeaker: 'Narator',
      storyFlag: {
        bullied: false,
        talkedFriend: false,
        choseReportPath: false,
        metPemantik: false,
        goodEnding: false
      },
      endingText: ''
    };

    const sceneTitles = {
      intro: 'Halaman Sekolah',
      school: 'Di Sekolah',
      home: 'Di Rumah',
      friend: 'Bertemu Sahabat',
      report: 'Menu Laporan',
      pemantik: 'Bertemu Pemantik',
      ending: 'Ending'
    };

    const lines = {
      intro: [
        ['Narator', 'Pagi ini, kamu berjalan ke sekolah dengan hati yang berat. Hari-hari terakhir terasa tidak nyaman, tapi kamu belum tahu harus bicara ke siapa.'],
        ['Narator', 'Gerakkan karakter ke kiri atau kanan untuk menjelajah. Dekati sekolah, rumah, sahabat, dan anggota Pemantik untuk berinteraksi.']
      ],
      bully: [
        ['Pembully', 'Hei, kenapa jalan kayak gitu? Lemot banget.'],
        ['Pembully', 'Ngaca dulu sebelum ngomong. Jangan sok kuat kalau cuma sendiri.'],
        ['Narator', 'Kata-kata itu berulang. Kamu mulai merasa kesal, takut, dan capek.'],
        ['Narator', 'Tapi kamu masih punya pilihan: diam, mencari bantuan, atau melawan dengan cara yang aman.']
      ],
      home: [
        ['Narator', 'Di rumah, kamu mencoba tenang. Tapi ucapan di sekolah masih berputar di kepala.'],
        ['Narator', 'Kamu sadar masalah ini tidak akan selesai sendiri. Saatnya mencari orang yang bisa dipercaya.']
      ],
      friend: [
        ['Sahabat', 'Wajahmu kelihatan capek. Cerita aja, aku dengerin.'],
        ['Kamu', 'Aku dibully terus di sekolah. Aku bingung harus ngapain.'],
        ['Sahabat', 'Kamu nggak sendirian. Kita cari bantuan yang aman dan resmi.'],
        ['Sahabat', 'Kalau kamu mau, ada dua jalan: lapor lewat aplikasi Pemantik, atau ketemu langsung anggota Pemantik.']
      ],
      report: [
        ['Sahabat', 'Kamu mau tahu anggota Pemantik yang ada? Pilih yang menurutmu paling nyaman.'],
        ['Narator', 'Di layar, kamu melihat beberapa pilihan anggota dengan gaya kerja yang berbeda.'],
        ['Narator', 'Pilih satu anggota, lalu ceritakan kejadian yang kamu alami secara jujur dan singkat.']
      ],
      pemantik: [
        ['Pemantik', 'Terima kasih sudah berani cerita. Kamu tidak salah karena meminta bantuan.'],
        ['Pemantik', 'Kami akan menindaklanjuti ke BK dan pihak sekolah dengan jalur yang aman.'],
        ['Narator', 'Kamu akhirnya punya dukungan nyata. Masalah tidak hilang seketika, tapi kamu tidak sendirian lagi.']
      ],
      endingGood: [
        ['Narator', 'Good Ending: Sekolah menindaklanjuti laporan. Pembully dipanggil, dan kamu mendapat perlindungan serta pendampingan.'],
        ['Narator', 'Kamu belajar bahwa minta bantuan bukan tanda lemah. Itu langkah untuk menjaga diri.']
      ],
      endingBad: [
        ['Narator', 'Bad Ending: Kamu memendam semuanya sendiri terlalu lama. Hari-hari terasa makin berat dan kamu menarik diri dari banyak hal.'],
        ['Narator', 'Cerita ini berhenti di sini agar tetap aman, tetapi pesannya jelas: jangan hadapi ini sendirian. Cari orang dewasa tepercaya, konselor, guru, atau layanan bantuan di tempatmu.']
      ]
    };

    const worldPositions = {
      school: 12,
      bully: 23,
      home: 82,
      friend: 54,
      pemantik: 66
    };

    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

    function setMessage(text) {
      messageEl.textContent = text || '';
    }

    function updateSceneTitle() {
      scenePill.textContent = sceneTitles[state.scene] || state.scene;
      stepPill.textContent = String(state.step);
    }

    function worldWidthVW() {
      return Math.max(window.innerWidth, 960);
    }

    function screenToWorldX(percent) {
      return (percent / 100) * worldWidthVW();
    }

    function setPlayerX(x) {
      state.x = clamp(x, 3, 97);
      playerEl.style.left = state.x + 'vw';
      updateFollowPositions();
    }

    function updateFollowPositions() {
      bullyEl.style.left = worldPositions.bully + 'vw';
      friendEl.style.left = worldPositions.friend + 'vw';
      pemantikEl.style.left = worldPositions.pemantik + 'vw';

      if (state.scene === 'home' || state.scene === 'ending') {
        playerEl.style.bottom = 'calc(26% + 3px)';
      } else {
        playerEl.style.bottom = 'calc(26% + 3px)';
      }
    }

    function showBubble(speaker, text, hint = 'Tekan Z / Enter / ketuk dialog untuk lanjut.') {
      bubbleSpeaker.textContent = speaker;
      bubbleText.textContent = text;
      bubbleHint.textContent = hint;
      bubbleEl.classList.add('show');
    }

    function hideBubble() {
      bubbleEl.classList.remove('show');
    }

    function showDialogue(speaker, text, choices = []) {
      state.inDialogue = true;
      state.currentSpeaker = speaker;
      speakerName.textContent = speaker;
      dialogueText.textContent = text;
      choicesEl.innerHTML = '';
      if (choices.length) {
        choices.forEach(ch => {
          const btn = document.createElement('button');
          btn.className = 'choice ' + (ch.kind || '');
          btn.textContent = ch.label;
          btn.onclick = ch.action;
          choicesEl.appendChild(btn);
        });
      }
    }

    function clearDialogue() {
      state.inDialogue = false;
      speakerName.textContent = 'Narator';
      dialogueText.textContent = '';
      choicesEl.innerHTML = '';
    }

    function startSequence(seq, onDone) {
      let i = 0;
      const play = () => {
        if (i >= seq.length) {
          onDone && onDone();
          return;
        }
        const [speaker, text] = seq[i++];
        showDialogue(speaker, text);
        showBubble(speaker, text, 'Tekan Lanjut untuk dialog berikutnya.');
      };
      play();
      state.sequence = seq;
      state.sequenceIndex = 0;
      state.sequenceOnDone = onDone;
      state.playingSequence = true;
    }

    function nextSequenceLine() {
      if (!state.playingSequence) return false;
      state.sequenceIndex += 1;
      if (state.sequenceIndex >= state.sequence.length) {
        state.playingSequence = false;
        hideBubble();
        clearDialogue();
        state.sequenceOnDone && state.sequenceOnDone();
        return true;
      }
      const [speaker, text] = state.sequence[state.sequenceIndex];
      showDialogue(speaker, text);
      showBubble(speaker, text, 'Tekan Lanjut untuk dialog berikutnya.');
      return true;
    }

    function distanceTo(entityX) {
      return Math.abs(state.x - entityX);
    }

    function inRange(entityX, range = 4.5) {
      return distanceTo(entityX) <= range;
    }

    function openSchoolEncounter() {
      if (state.storyFlag.bullied) {
        showBubble('Narator', 'Kamu sudah merasakan tekanan dari sekolah. Sekarang kamu bisa pulang, bicara dengan sahabat, atau bertemu Pemantik.');
        return;
      }
      state.storyFlag.bullied = true;
      state.step = 1;
      updateSceneTitle();
      startSequence(lines.bully, () => {
        showDialogue('Narator', 'Kamu menelan emosi itu dan berjalan pergi.');
      });
    }

    function openHomeEncounter() {
      state.scene = 'home';
      state.step = Math.max(state.step, 2);
      updateSceneTitle();
      startSequence(lines.home, () => {
        showDialogue('Narator', 'Kamu bisa kembali ke sekolah, menemui sahabatmu, atau cari anggota Pemantik.');
      });
    }

    function openFriendEncounter() {
      state.scene = 'friend';
      state.storyFlag.talkedFriend = true;
      state.step = Math.max(state.step, 3);
      updateSceneTitle();
      startSequence(lines.friend, () => {
        showDialogue('Sahabat', 'Pilih jalanmu sekarang. Aku ada di sini.', [
          {
            label: 'Lapor lewat aplikasi Pemantik',
            kind: 'good',
            action: () => chooseReport('app')
          },
          {
            label: 'Ketemu langsung anggota Pemantik',
            kind: 'good',
            action: () => chooseReport('meet')
          },
          {
            label: 'Aku belum siap melapor',
            kind: 'warn',
            action: () => chooseAvoid()
          }
        ]);
      });
    }

    function chooseReport(type) {
      state.storyFlag.choseReportPath = true;
      state.scene = 'report';
      state.step = Math.max(state.step, 4);
      updateSceneTitle();
      const labels = [
        'Ketua Pemantik — tenang, rapi, cocok untuk laporan yang detail',
        'Anggota Lapangan — cepat bergerak dan responsif',
        'Anggota Konseling — mendengar dengan sabar dan empatik'
      ];
      const members = [
        { name: 'Ketua Pemantik', desc: labels[0] },
        { name: 'Anggota Lapangan', desc: labels[1] },
        { name: 'Anggota Konseling', desc: labels[2] }
      ];
      showDialogue('Sahabat', 'Pilih anggota yang paling cocok menurutmu:', members.map((m, idx) => ({
        label: `${m.name} — ${m.desc}`,
        kind: idx === 2 ? 'good' : '',
        action: () => chooseMember(m.name, type)
      })));
    }

    function chooseMember(memberName, type) {
      state.scene = 'pemantik';
      state.storyFlag.metPemantik = true;
      state.step = Math.max(state.step, 5);
      updateSceneTitle();
      let intro = type === 'app'
        ? 'Kamu membuka aplikasi Pemantik dari ponselmu dan menulis semua kejadian yang kamu alami.'
        : 'Kamu datang langsung dan menjelaskan kejadian yang kamu alami dengan jujur.';
      showDialogue('Narator', intro + '\n\n' + memberName + ' mendengarkan tanpa menghakimi, lalu menindaklanjuti laporan itu.');
      setTimeout(() => {
        showDialogue('Pemantik', 'Kamu sudah melakukan langkah yang benar. Laporanmu akan diteruskan ke BK dan pihak sekolah.', [
          { label: 'Lanjut ke good ending', kind: 'good', action: finishGoodEnding }
        ]);
      }, 500);
    }

    function chooseAvoid() {
      state.storyFlag.goodEnding = false;
      state.scene = 'ending';
      state.step = 6;
      updateSceneTitle();
      showDialogue('Narator', 'Kamu memilih memendam semuanya sendirian. Cerita berhenti di sini dengan peringatan bahwa menahan semuanya sendiri bisa membuat keadaan makin berat.', [
        { label: 'Lihat ending yang aman', kind: 'bad', action: finishBadEnding }
      ]);
    }

    function finishGoodEnding() {
      state.storyFlag.goodEnding = true;
      state.scene = 'ending';
      state.step = 7;
      updateSceneTitle();
      showDialogue('Narator', lines.endingGood[0][1] + '\n\n' + lines.endingGood[1][1], [
        { label: 'Main lagi', kind: 'good', action: resetGame }
      ]);
    }

    function finishBadEnding() {
      state.scene = 'ending';
      state.step = 7;
      updateSceneTitle();
      showDialogue('Narator', lines.endingBad[0][1] + '\n\n' + lines.endingBad[1][1], [
        { label: 'Coba jalur baik', kind: 'good', action: resetGame }
      ]);
    }

    function interact() {
      if (state.playingSequence) return nextSequenceLine();
      if (state.inDialogue && choicesEl.children.length) return;
      if (state.scene === 'ending') return resetGame();
      if (inRange(worldPositions.school) || inRange(worldPositions.bully)) return openSchoolEncounter();
      if (inRange(worldPositions.home)) return openHomeEncounter();
      if (inRange(worldPositions.friend)) return openFriendEncounter();
      if (inRange(worldPositions.pemantik)) return chooseReport('meet');
      setMessage('Dekatkan karakter ke sekolah, rumah, sahabat, atau Pemantik lalu tekan Interaksi.');
    }

    function resetGame() {
      state.x = 12;
      state.moving = 0;
      state.scene = 'intro';
      state.step = 0;
      state.inDialogue = false;
      state.playingSequence = false;
      state.storyFlag = {
        bullied: false,
        talkedFriend: false,
        choseReportPath: false,
        metPemantik: false,
        goodEnding: false
      };
      clearDialogue();
      hideBubble();
      setMessage('');
      updateSceneTitle();
      setPlayerX(12);
      showDialogue('Narator', lines.intro[0][1] + '\n\n' + lines.intro[1][1]);
    }

    function tick() {
      if (state.moving !== 0 && !state.playingSequence && state.scene !== 'ending') {
        setPlayerX(state.x + state.moving * state.speed * 0.8);
      }

      if (!state.playingSequence) {
        const nearSchool = inRange(worldPositions.school, 6);
        const nearBully = inRange(worldPositions.bully, 4.5);
        const nearHouse = inRange(worldPositions.home, 5);
        const nearFriend = inRange(worldPositions.friend, 4.5);
        const nearPemantik = inRange(worldPositions.pemantik, 4.5);

        if (nearSchool && !state.storyFlag.bullied) {
          showBubble('Narator', 'Dekat sekolah. Tekan Interaksi untuk memulai cerita.', 'Sekolah terlihat ramai, tapi suasananya terasa berat.');
        } else if (nearBully && !state.storyFlag.bullied) {
          showBubble('Pembully', 'Ugh, kamu lagi?', 'Tekan Interaksi untuk menghadapi dialog awal.');
        } else if (nearHouse && state.step >= 1) {
          showBubble('Narator', 'Rumah adalah tempat yang aman. Tekan Interaksi untuk merenung.', 'Di rumah, kamu bisa memilih langkah berikutnya.');
        } else if (nearFriend && state.step >= 2) {
          showBubble('Sahabat', 'Aku siap dengerin.', 'Tekan Interaksi untuk curhat ke sahabat.');
        } else if (nearPemantik && state.step >= 3) {
          showBubble('Pemantik', 'Silakan sampaikan laporanmu.', 'Tekan Interaksi untuk bicara langsung dengan Pemantik.');
        } else {
          hideBubble();
        }
      }

      requestAnimationFrame(tick);
    }

    document.getElementById('leftBtn').addEventListener('touchstart', e => { e.preventDefault(); state.moving = -1; }, { passive: false });
    document.getElementById('leftBtn').addEventListener('touchend', () => state.moving = 0);
    document.getElementById('rightBtn').addEventListener('touchstart', e => { e.preventDefault(); state.moving = 1; }, { passive: false });
    document.getElementById('rightBtn').addEventListener('touchend', () => state.moving = 0);
    document.getElementById('leftBtn').addEventListener('mousedown', () => state.moving = -1);
    document.getElementById('rightBtn').addEventListener('mousedown', () => state.moving = 1);
    document.addEventListener('mouseup', () => state.moving = 0);

    document.getElementById('interactBtn').addEventListener('click', interact);
    document.getElementById('nextBtn').addEventListener('click', () => {
      if (state.playingSequence) return nextSequenceLine();
      if (bubbleEl.classList.contains('show')) return interact();
      if (state.inDialogue && choicesEl.children.length) return;
      setMessage('Tekan Interaksi saat dekat NPC atau bangunan.');
    });
    document.getElementById('restartBtn').addEventListener('click', resetGame);

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') state.moving = -1;
      if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') state.moving = 1;
      if (e.key === 'z' || e.key === 'Z' || e.key === 'Enter' || e.key === ' ') interact();
    });
    document.addEventListener('keyup', (e) => {
      if (['ArrowLeft','ArrowRight','a','A','d','D'].includes(e.key)) state.moving = 0;
    });

    window.addEventListener('resize', updateFollowPositions);

    setPlayerX(12);
    updateSceneTitle();
    updateFollowPositions();
    showDialogue('Narator', lines.intro[0][1] + '\n\n' + lines.intro[1][1]);
    tick();
  </script></body>
</html>
