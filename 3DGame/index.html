<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Story Game 3D - Berani Bercerita</title>
  <style>
    :root {
      --bg: #07111f;
      --panel: rgba(15, 23, 42, 0.78);
      --panel2: rgba(2, 6, 23, 0.75);
      --text: #e5eefc;
      --muted: #b8c6dd;
      --accent: #60a5fa;
      --accent2: #34d399;
      --danger: #fb7185;
      --warn: #fbbf24;
    }html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: radial-gradient(circle at top, #10213d 0%, #060b14 60%, #02040a 100%);
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  color: var(--text);
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}

canvas {
  display: block;
  width: 100vw;
  height: 100vh;
}

.hud {
  position: fixed;
  inset: 0;
  pointer-events: none;
}

.topbar {
  position: absolute;
  top: 12px;
  left: 12px;
  right: 12px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
}

.card {
  pointer-events: none;
  background: var(--panel);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 10px 30px rgba(0,0,0,0.28);
  backdrop-filter: blur(10px);
  border-radius: 16px;
  padding: 12px 14px;
}

.title {
  font-size: 16px;
  font-weight: 800;
  margin: 0 0 4px;
}

.sub {
  font-size: 12px;
  opacity: 0.88;
  margin: 0;
  line-height: 1.5;
  color: var(--muted);
}

.stats {
  text-align: right;
  min-width: 148px;
}

.stats b {
  color: #fff;
}

.storyBox {
  position: absolute;
  left: 50%;
  bottom: 130px;
  transform: translateX(-50%);
  width: min(92vw, 760px);
  background: linear-gradient(180deg, rgba(15, 23, 42, 0.9), rgba(2, 6, 23, 0.88));
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 20px;
  padding: 14px 16px 12px;
  box-shadow: 0 16px 40px rgba(0,0,0,0.34);
  pointer-events: auto;
  display: none;
}

.storyBox.show { display: block; }

.storyName {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
  font-weight: 800;
  font-size: 14px;
}

.storyText {
  font-size: 15px;
  line-height: 1.6;
  color: #eef4ff;
  margin-bottom: 12px;
  min-height: 48px;
  white-space: pre-wrap;
}

.choices {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.choiceBtn {
  pointer-events: auto;
  border: 1px solid rgba(255,255,255,0.14);
  background: rgba(96, 165, 250, 0.16);
  color: var(--text);
  border-radius: 14px;
  padding: 10px 12px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
}

.choiceBtn:hover,
.choiceBtn:active {
  background: rgba(96, 165, 250, 0.26);
}

.centerMsg {
  position: absolute;
  left: 50%;
  top: 18%;
  transform: translateX(-50%);
  padding: 10px 14px;
  border-radius: 999px;
  background: rgba(52, 211, 153, 0.14);
  border: 1px solid rgba(52, 211, 153, 0.25);
  font-size: 13px;
  opacity: 0;
  transition: opacity 0.25s ease;
}

.centerMsg.show { opacity: 1; }

.controls {
  position: absolute;
  left: 12px;
  right: 12px;
  bottom: 12px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 16px;
}

.pad {
  pointer-events: auto;
  display: grid;
  grid-template-columns: 58px 58px 58px;
  grid-template-rows: 58px 58px 58px;
  gap: 8px;
  opacity: 0.95;
}

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid rgba(255,255,255,0.14);
  background: rgba(15, 23, 42, 0.72);
  color: var(--text);
  border-radius: 16px;
  font-size: 18px;
  font-weight: 800;
  box-shadow: 0 8px 20px rgba(0,0,0,0.25);
  touch-action: none;
}

.btn:active, .btn.active {
  transform: translateY(1px) scale(0.98);
  background: rgba(96, 165, 250, 0.24);
  border-color: rgba(96, 165, 250, 0.45);
}

.actionPanel {
  pointer-events: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
  align-items: flex-end;
}

.actionBtn {
  width: 112px;
  height: 58px;
  font-size: 16px;
}

.barWrap {
  margin-top: 8px;
  width: 180px;
  height: 10px;
  border-radius: 999px;
  overflow: hidden;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.08);
}

.bar {
  height: 100%;
  width: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, var(--accent2), var(--accent));
  transform-origin: left center;
}

.hintTag {
  display: inline-block;
  padding: 3px 8px;
  border-radius: 999px;
  background: rgba(96, 165, 250, 0.14);
  border: 1px solid rgba(96, 165, 250, 0.18);
  color: #dbeafe;
  font-size: 11px;
  font-weight: 700;
}

@media (max-width: 720px) {
  .storyBox { bottom: 126px; width: min(94vw, 760px); padding: 12px 13px 11px; }
  .pad { grid-template-columns: 54px 54px 54px; grid-template-rows: 54px 54px 54px; gap: 7px; }
  .btn { border-radius: 14px; }
  .actionBtn { width: 98px; height: 54px; }
  .stats { min-width: 120px; }
  .storyText { font-size: 14px; }
}

  </style>
</head>
<body>
  <div class="hud">
    <div class="topbar">
      <div class="card">
        <p class="title">Story Game 3D: Berani Bercerita</p>
        <p class="sub">Gerak: WASD / panah<br>HP: tombol layar<br>Masuk ke area bercahaya untuk lanjut cerita</p>
      </div>
      <div class="card stats">
        <p class="sub">Bab: <b id="chapter">0</b></p>
        <p class="sub">Keberanian: <b id="bravery">0</b></p>
        <p class="sub">Petunjuk: <b id="clues">0</b></p>
      </div>
    </div><div id="msg" class="centerMsg">Datangi titik cahaya untuk memulai cerita.</div>

<div id="storyBox" class="storyBox">
  <div class="storyName">
    <span id="speaker">Narator</span>
    <span class="hintTag" id="sceneTag">Bab 1</span>
  </div>
  <div id="storyText" class="storyText"></div>
  <div id="choices" class="choices"></div>
</div>

<div class="controls">
  <div class="pad" aria-label="Kontrol arah">
    <div></div>
    <button class="btn" data-key="ArrowUp">▲</button>
    <div></div>
    <button class="btn" data-key="ArrowLeft">◀</button>
    <button class="btn" data-key="ArrowDown">●</button>
    <button class="btn" data-key="ArrowRight">▶</button>
    <div></div>
    <div></div>
    <div></div>
  </div>

  <div class="actionPanel">
    <button class="btn actionBtn" id="interactBtn">Interaksi</button>
    <button class="btn actionBtn" id="resetBtn">Ulang</button>
    <div class="barWrap" aria-label="Bar keberanian"><div id="hpBar" class="bar"></div></div>
  </div>
</div>

  </div>  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

    const chapterEl = document.getElementById('chapter');
    const braveryEl = document.getElementById('bravery');
    const cluesEl = document.getElementById('clues');
    const msgEl = document.getElementById('msg');
    const storyBox = document.getElementById('storyBox');
    const speakerEl = document.getElementById('speaker');
    const storyTextEl = document.getElementById('storyText');
    const choicesEl = document.getElementById('choices');
    const sceneTagEl = document.getElementById('sceneTag');
    const hpBar = document.getElementById('hpBar');
    const resetBtn = document.getElementById('resetBtn');
    const interactBtn = document.getElementById('interactBtn');

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x09111f, 18, 120);

    const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const hemi = new THREE.HemisphereLight(0xbcdcff, 0x0a1020, 1.2);
    scene.add(hemi);

    const sun = new THREE.DirectionalLight(0xffffff, 1.7);
    sun.position.set(20, 30, 12);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.left = -40;
    sun.shadow.camera.right = 40;
    sun.shadow.camera.top = 40;
    sun.shadow.camera.bottom = -40;
    scene.add(sun);

    const groundGeo = new THREE.PlaneGeometry(240, 240, 20, 20);
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x15314d, roughness: 1, metalness: 0 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    const grid = new THREE.GridHelper(240, 48, 0x335577, 0x1a3550);
    grid.position.y = 0.02;
    scene.add(grid);

    function makeBuilding(w, h, d, x, z, color) {
      const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(w, h, d),
        new THREE.MeshStandardMaterial({ color, roughness: 0.85 })
      );
      mesh.position.set(x, h / 2, z);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);
      return mesh;
    }

    // Scene props
    makeBuilding(10, 4, 8, -18, -12, 0x8b5cf6);
    makeBuilding(12, 6, 9, 16, -14, 0x38bdf8);
    makeBuilding(8, 5, 8, -16, 14, 0xf97316);
    makeBuilding(9, 7, 10, 18, 16, 0x22c55e);

    const school = new THREE.Group();
    const schoolBase = new THREE.Mesh(
      new THREE.BoxGeometry(16, 7, 10),
      new THREE.MeshStandardMaterial({ color: 0x64748b, roughness: 0.8 })
    );
    schoolBase.castShadow = true;
    schoolBase.receiveShadow = true;
    schoolBase.position.set(0, 3.5, -22);
    school.add(schoolBase);

    const schoolRoof = new THREE.Mesh(
      new THREE.BoxGeometry(17, 1, 11),
      new THREE.MeshStandardMaterial({ color: 0x1f2937, roughness: 0.8 })
    );
    schoolRoof.position.set(0, 7.2, -22);
    schoolRoof.castShadow = true;
    school.add(schoolRoof);

    const schoolSign = new THREE.Mesh(
      new THREE.BoxGeometry(8, 1.2, 0.4),
      new THREE.MeshStandardMaterial({ color: 0xfbbf24, roughness: 0.6 })
    );
    schoolSign.position.set(0, 5.3, -16.8);
    school.add(schoolSign);
    scene.add(school);

    const fountain = new THREE.Mesh(
      new THREE.CylinderGeometry(2.4, 2.8, 1, 24),
      new THREE.MeshStandardMaterial({ color: 0x94a3b8, roughness: 0.9 })
    );
    fountain.position.set(10, 0.5, 4);
    fountain.receiveShadow = true;
    scene.add(fountain);

    const player = new THREE.Group();
    const body = new THREE.Mesh(
      new THREE.BoxGeometry(1.2, 1.7, 1.2),
      new THREE.MeshStandardMaterial({ color: 0x60a5fa, roughness: 0.65 })
    );
    body.castShadow = true;
    body.position.y = 0.85;
    player.add(body);

    const head = new THREE.Mesh(
      new THREE.SphereGeometry(0.45, 24, 24),
      new THREE.MeshStandardMaterial({ color: 0xf8fafc, roughness: 0.7 })
    );
    head.castShadow = true;
    head.position.y = 2.0;
    player.add(head);
    scene.add(player);

    const npcGeo = new THREE.BoxGeometry(1.1, 1.6, 1.1);
    function makeNpc(x, z, color, name) {
      const group = new THREE.Group();
      const mesh = new THREE.Mesh(npcGeo, new THREE.MeshStandardMaterial({ color, roughness: 0.75 }));
      mesh.castShadow = true;
      mesh.position.y = 0.8;
      group.add(mesh);
      const head = new THREE.Mesh(
        new THREE.SphereGeometry(0.42, 18, 18),
        new THREE.MeshStandardMaterial({ color: 0xf8fafc, roughness: 0.8 })
      );
      head.position.y = 1.95;
      head.castShadow = true;
      group.add(head);
      group.position.set(x, 0, z);
      group.userData.name = name;
      scene.add(group);
      return group;
    }

    const bully = makeNpc(-2, -18.5, 0xef4444, 'Pembully');
    const friend = makeNpc(7, -19, 0x22c55e, 'Teman');
    const teacher = makeNpc(-9, -16, 0x60a5fa, 'Guru BK');

    const glowPoint = new THREE.Mesh(
      new THREE.SphereGeometry(0.55, 20, 20),
      new THREE.MeshStandardMaterial({ color: 0x34d399, emissive: 0x1fa66d, emissiveIntensity: 1.8 })
    );
    glowPoint.position.set(0, 0.55, 10);
    scene.add(glowPoint);

    const clueMarkers = [
      new THREE.Vector3(-8, 0.5, -8),
      new THREE.Vector3(8, 0.5, -6),
      new THREE.Vector3(0, 0.5, -14)
    ].map((p, i) => {
      const m = new THREE.Mesh(
        new THREE.TorusGeometry(0.8, 0.18, 10, 24),
        new THREE.MeshStandardMaterial({ color: i === 0 ? 0xfbbf24 : i === 1 ? 0x60a5fa : 0x34d399, emissive: 0x111827, roughness: 0.5 })
      );
      m.position.copy(p);
      m.rotation.x = Math.PI / 2;
      m.castShadow = true;
      scene.add(m);
      return m;
    });

    const zones = {
      start: new THREE.Vector3(0, 0, 10),
      bully: new THREE.Vector3(-2, 0, -18.5),
      friend: new THREE.Vector3(7, 0, -19),
      teacher: new THREE.Vector3(-9, 0, -16),
      school: new THREE.Vector3(0, 0, -22)
    };

    const state = {
      scene: 'intro',
      chapter: 1,
      bravery: 0,
      clues: 0,
      storyOpen: false,
      moveSpeed: 0.17,
      interactCooldown: 0,
      lastChoice: '',
    };

    const startPos = new THREE.Vector3(0, 0, 10);
    player.position.copy(startPos);

    let keys = { up: false, down: false, left: false, right: false, jump: false };
    let velocityY = 0;
    let grounded = true;
    let targetCam = new THREE.Vector3();
    let camPos = new THREE.Vector3(0, 7, 12);
    let messageTimer = 0;

    function setMessage(text, seconds = 1.5) {
      msgEl.textContent = text;
      msgEl.classList.add('show');
      messageTimer = seconds;
    }

    function updateStats() {
      chapterEl.textContent = state.chapter;
      braveryEl.textContent = state.bravery;
      cluesEl.textContent = state.clues;
      hpBar.style.transform = `scaleX(${Math.max(0.1, Math.min(1, 0.25 + state.bravery / 6))})`;
    }

    function openStory(speaker, text, choices, tag = '') {
      storyBox.classList.add('show');
      speakerEl.textContent = speaker;
      storyTextEl.textContent = text;
      sceneTagEl.textContent = tag || `Bab ${state.chapter}`;
      choicesEl.innerHTML = '';
      choices.forEach((choice) => {
        const btn = document.createElement('button');
        btn.className = 'choiceBtn';
        btn.textContent = choice.label;
        btn.addEventListener('click', () => choice.action());
        choicesEl.appendChild(btn);
      });
      state.storyOpen = true;
    }

    function closeStory() {
      storyBox.classList.remove('show');
      choicesEl.innerHTML = '';
      state.storyOpen = false;
    }

    function beginIntro() {
      state.scene = 'intro';
      openStory(
        'Narator',
        'Pagi itu, kamu berangkat ke sekolah dengan hati yang agak berat.
Di halaman sekolah, ada dua titik yang bisa kamu dekati: cerita utama dan petunjuk kecil yang akan membantumu melewati hari ini.',
        [
          { label: 'Mulai petualangan', action: () => { closeStory(); setMessage('Arahkan karakter ke titik cahaya hijau.', 2); } },
          { label: 'Lihat tujuan cerita', action: () => { state.lastChoice = 'tujuan'; storyTextEl.textContent = 'Tujuanmu sederhana: tetap tenang, cari dukungan yang aman, dan buktikan bahwa kamu tidak sendirian.'; } }
        ],
        'Pembuka'
      );
      updateStats();
    }

    function startBullyScene() {
      state.scene = 'bully';
      state.chapter = 2;
      updateStats();
      openStory(
        bully.userData.name,
        'Pembully itu menatapmu dan melontarkan kata-kata yang menyakitkan.
Kamu diberi 3 pilihan respons. Tidak ada yang harus kamu lakukan sendirian.',
        [
          {
            label: 'Tetap tenang',
            action: () => {
              state.bravery += 1;
              state.clues += 1;
              state.lastChoice = 'tenang';
              closeStory();
              setMessage('Kamu memilih tenang. Itu langkah pertama yang bagus.', 2);
              updateStats();
            }
          },
          {
            label: 'Cari teman',
            action: () => {
              state.bravery += 1;
              state.clues += 1;
              state.lastChoice = 'teman';
              closeStory();
              setMessage('Kamu bergerak ke arah teman untuk cari dukungan.', 2);
              updateStats();
            }
          },
          {
            label: 'Cari guru BK',
            action: () => {
              state.bravery += 2;
              state.clues += 1;
              state.lastChoice = 'guru';
              closeStory();
              setMessage('Kamu memilih meminta bantuan orang dewasa yang tepat.', 2);
              updateStats();
            }
          }
        ],
        'Bab 2'
      );
    }

    function startFriendScene() {
      state.scene = 'friend';
      state.chapter = 3;
      updateStats();
      openStory(
        friend.userData.name,
        'Temanmu berkata, “Kamu tidak perlu menahan semuanya sendiri. Yuk, kita cari cara yang aman.”
Apa yang mau kamu lakukan?',
        [
          {
            label: 'Ceritakan perasaan',
            action: () => {
              state.bravery += 1;
              state.clues += 1;
              closeStory();
              setMessage('Bercerita bisa membuat beban terasa lebih ringan.', 2);
              updateStats();
            }
          },
          {
            label: 'Pergi ke guru BK',
            action: () => {
              state.bravery += 2;
              state.clues += 1;
              closeStory();
              setMessage('Kamu dan temanmu pergi mencari bantuan yang aman.', 2);
              updateStats();
            }
          }
        ],
        'Bab 3'
      );
    }

    function startTeacherScene() {
      state.scene = 'teacher';
      state.chapter = 4;
      updateStats();
      openStory(
        teacher.userData.name,
        'Guru BK mendengarkan tanpa menghakimi.
Beliau bilang: “Kamu sudah melakukan hal yang benar dengan datang ke sini.”
Sekarang kamu bisa memilih langkah lanjut yang sehat.',
        [
          {
            label: 'Minta pendampingan',
            action: () => {
              state.bravery += 2;
              state.clues += 1;
              closeStory();
              setMessage('Kamu mendapat dukungan dan rencana aman.', 2);
              updateStats();
            }
          },
          {
            label: 'Selesaikan cerita',
            action: () => {
              state.bravery += 1;
              closeStory();
              endGame();
            }
          }
        ],
        'Bab 4'
      );
    }

    function endGame() {
      state.scene = 'ending';
      state.chapter = 5;
      updateStats();
      openStory(
        'Narator',
        'Hari itu memang tidak mudah, tetapi kamu berhasil mengambil langkah yang aman.
Kamu tidak harus menunggu sampai semuanya berat untuk minta bantuan.
Berani bercerita adalah kekuatan.',
        [
          {
            label: 'Main lagi',
            action: () => {
              resetGame();
            }
          }
        ],
        'Ending'
      );
    }

    function resetGame() {
      player.position.copy(startPos);
      player.rotation.y = 0;
      velocityY = 0;
      grounded = true;
      state.scene = 'intro';
      state.chapter = 1;
      state.bravery = 0;
      state.clues = 0;
      state.moveSpeed = 0.17;
      state.interactCooldown = 0;
      state.lastChoice = '';
      closeStory();
      updateStats();
      setMessage('Datangi titik cahaya hijau untuk memulai cerita.', 2.5);
      beginIntro();
    }

    function distanceTo(v) {
      return player.position.distanceTo(v);
    }

    function canInteractWith(zone) {
      return distanceTo(zone) < 2.2;
    }

    function handleMovement(delta) {
      if (state.storyOpen) return;

      const dir = new THREE.Vector3();
      if (keys.up) dir.z -= 1;
      if (keys.down) dir.z += 1;
      if (keys.left) dir.x -= 1;
      if (keys.right) dir.x += 1;
      if (dir.lengthSq() > 0) dir.normalize();

      if (dir.lengthSq() > 0) {
        const angle = Math.atan2(dir.x, dir.z);
        player.rotation.y = angle;
        const forward = new THREE.Vector3(Math.sin(angle), 0, Math.cos(angle));
        player.position.addScaledVector(forward, state.moveSpeed * delta * 60);
      }

      if (keys.jump && grounded) {
        velocityY = 0.28;
        grounded = false;
      }

      velocityY -= 0.018 * delta * 60;
      player.position.y += velocityY * delta * 60;
      if (player.position.y <= 0) {
        player.position.y = 0;
        velocityY = 0;
        grounded = true;
      }

      player.position.x = THREE.MathUtils.clamp(player.position.x, -34, 34);
      player.position.z = THREE.MathUtils.clamp(player.position.z, -34, 34);

      // Animation and story triggers
      if (state.scene === 'intro' && canInteractWith(zones.start)) {
        setMessage('Tekan Interaksi untuk memulai cerita.', 0.4);
      }

      if (state.scene === 'intro' && canInteractWith(glowPoint.position)) {
        openStory(
          'Narator',
          'Sebuah cahaya hijau muncul di depan sekolah.
Itu tanda bahwa kamu sudah siap memulai langkah pertama.',
          [
            { label: 'Lanjut ke sekolah', action: () => { closeStory(); state.scene = 'walk'; state.chapter = 1; updateStats(); setMessage('Pergi ke area sekolah untuk melanjutkan.', 2); } }
          ],
          'Bab 1'
        );
      }

      if (state.scene === 'walk' && canInteractWith(zones.bully)) {
        startBullyScene();
      }

      if (state.scene === 'walk' && canInteractWith(zones.friend)) {
        startFriendScene();
      }

      if (state.scene === 'walk' && canInteractWith(zones.teacher)) {
        startTeacherScene();
      }

      if (state.scene === 'walk' && canInteractWith(zones.school)) {
        setMessage('Kamu sudah dekat dengan sekolah. Cari karakter yang bercahaya.', 0.5);
      }
    }

    function showNearestHint() {
      if (state.storyOpen) return;
      const dIntro = distanceTo(glowPoint.position);
      const dBully = distanceTo(zones.bully);
      const dFriend = distanceTo(zones.friend);
      const dTeacher = distanceTo(zones.teacher);
      const min = Math.min(dIntro, dBully, dFriend, dTeacher);

      if (min === dIntro && state.scene === 'intro') setMessage('Dekati cahaya hijau untuk membuka bab awal.', 0.7);
      else if (min === dBully && state.scene === 'walk') setMessage('Ada pembully di dekat halaman sekolah. Interaksi untuk dialog.', 0.7);
      else if (min === dFriend && state.scene === 'walk') setMessage('Temanmu ada di sini. Interaksi untuk ngobrol.', 0.7);
      else if (min === dTeacher && state.scene === 'walk') setMessage('Guru BK ada di dekat bangunan sekolah.', 0.7);
    }

    function animate(t = 0) {
      const delta = Math.min(0.033, (animate.last ? (t - animate.last) / 1000 : 0.016));
      animate.last = t;

      handleMovement(delta);

      [bully, friend, teacher].forEach((npc, i) => {
        npc.rotation.y = Math.sin(t * 0.001 + i) * 0.12;
      });

      glowPoint.rotation.y += 0.03;
      glowPoint.position.y = 0.55 + Math.sin(t * 0.002) * 0.12;

      clueMarkers.forEach((m, i) => {
        m.rotation.z += 0.02 + i * 0.003;
        m.position.y = 0.5 + Math.sin(t * 0.002 + i) * 0.09;
      });

      targetCam.set(player.position.x, player.position.y + 4.8, player.position.z + 10.5);
      camPos.lerp(targetCam, 0.08);
      camera.position.copy(camPos);
      camera.lookAt(player.position.x, player.position.y + 1.2, player.position.z);

      if (messageTimer > 0 && messageTimer !== 999) {
        messageTimer -= delta;
        if (messageTimer <= 0) msgEl.classList.remove('show');
      }

      // gentle reminder when nothing is open
      if (!state.storyOpen && Math.random() < 0.01) showNearestHint();

      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    function interact() {
      if (state.scene === 'intro' && distanceTo(glowPoint.position) < 2.2) {
        openStory(
          'Narator',
          'Kamu berdiri di halaman sekolah. Hari ini bukan soal menang atau kalah, tapi soal memilih langkah yang aman dan sehat.',
          [
            { label: 'Masuk bab berikutnya', action: () => { closeStory(); state.scene = 'walk'; setMessage('Jelajahi halaman sekolah.', 2); } }
          ],
          'Bab 1'
        );
        return;
      }

      if (state.scene === 'walk') {
        if (canInteractWith(zones.bully)) return startBullyScene();
        if (canInteractWith(zones.friend)) return startFriendScene();
        if (canInteractWith(zones.teacher)) return startTeacherScene();
      }
    }

    function setKey(name, stateOn) {
      switch (name) {
        case 'ArrowUp': case 'w': case 'W': keys.up = stateOn; break;
        case 'ArrowDown': case 's': case 'S': keys.down = stateOn; break;
        case 'ArrowLeft': case 'a': case 'A': keys.left = stateOn; break;
        case 'ArrowRight': case 'd': case 'D': keys.right = stateOn; break;
        case ' ': keys.jump = stateOn; break;
      }
    }

    window.addEventListener('keydown', (e) => {
      setKey(e.key, true);
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) e.preventDefault();
      if (e.key === 'Enter') interact();
    }, { passive: false });

    window.addEventListener('keyup', (e) => setKey(e.key, false));

    document.querySelectorAll('[data-key]').forEach((btn) => {
      const key = btn.dataset.key;
      const down = () => { setKey(key, true); btn.classList.add('active'); };
      const up = () => { setKey(key, false); btn.classList.remove('active'); };
      btn.addEventListener('pointerdown', down);
      btn.addEventListener('pointerup', up);
      btn.addEventListener('pointercancel', up);
      btn.addEventListener('pointerleave', up);
      btn.addEventListener('contextmenu', (e) => e.preventDefault());
    });

    interactBtn.addEventListener('click', interact);
    resetBtn.addEventListener('click', resetGame);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateStats();
    setMessage('Datangi cahaya hijau untuk memulai cerita.', 2.5);
    beginIntro();
    animate();
  </script></body>
</html>
