<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>3D HTML Game Template</title>
  <style>
    :root {
      --bg: #08111f;
      --panel: rgba(15, 23, 42, 0.78);
      --text: #e5eefc;
      --accent: #60a5fa;
      --accent2: #34d399;
      --danger: #f87171;
    }html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: radial-gradient(circle at top, #10213d 0%, #060b14 60%, #02040a 100%);
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  color: var(--text);
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}

canvas {
  display: block;
  width: 100vw;
  height: 100vh;
}

.hud {
  position: fixed;
  inset: 0;
  pointer-events: none;
}

.topbar {
  position: absolute;
  top: 12px;
  left: 12px;
  right: 12px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
}

.card {
  pointer-events: none;
  background: var(--panel);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 10px 30px rgba(0,0,0,0.28);
  backdrop-filter: blur(10px);
  border-radius: 16px;
  padding: 12px 14px;
}

.title {
  font-size: 16px;
  font-weight: 700;
  margin: 0 0 4px;
}

.sub {
  font-size: 12px;
  opacity: 0.88;
  margin: 0;
  line-height: 1.45;
}

.stats {
  text-align: right;
  min-width: 132px;
}

.stats b {
  color: #fff;
}

.centerMsg {
  position: absolute;
  left: 50%;
  top: 18%;
  transform: translateX(-50%);
  padding: 10px 14px;
  border-radius: 999px;
  background: rgba(96, 165, 250, 0.16);
  border: 1px solid rgba(96, 165, 250, 0.25);
  font-size: 13px;
  opacity: 0;
  transition: opacity 0.25s ease;
}

.centerMsg.show { opacity: 1; }

.controls {
  position: absolute;
  left: 12px;
  right: 12px;
  bottom: 12px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 16px;
}

.pad {
  pointer-events: auto;
  display: grid;
  grid-template-columns: 58px 58px 58px;
  grid-template-rows: 58px 58px 58px;
  gap: 8px;
  opacity: 0.95;
}

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid rgba(255,255,255,0.14);
  background: rgba(15, 23, 42, 0.72);
  color: var(--text);
  border-radius: 16px;
  font-size: 18px;
  font-weight: 700;
  box-shadow: 0 8px 20px rgba(0,0,0,0.25);
  touch-action: none;
}

.btn:active, .btn.active {
  transform: translateY(1px) scale(0.98);
  background: rgba(96, 165, 250, 0.24);
  border-color: rgba(96, 165, 250, 0.45);
}

.actionPanel {
  pointer-events: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
  align-items: flex-end;
}

.actionBtn {
  width: 104px;
  height: 58px;
  font-size: 16px;
}

.barWrap {
  margin-top: 8px;
  width: 180px;
  height: 10px;
  border-radius: 999px;
  overflow: hidden;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.08);
}

.bar {
  height: 100%;
  width: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, var(--accent2), var(--accent));
  transform-origin: left center;
}

.hiddenMobileHint {
  display: none;
}

@media (max-width: 720px) {
  .pad { grid-template-columns: 54px 54px 54px; grid-template-rows: 54px 54px 54px; gap: 7px; }
  .btn { border-radius: 14px; }
  .actionBtn { width: 96px; height: 54px; }
  .stats { min-width: 116px; }
}

  </style>
</head>
<body>
  <div class="hud">
    <div class="topbar">
      <div class="card">
        <p class="title">3D HTML Game Template</p>
        <p class="sub">Gerak: WASD / panah<br>HP: tombol layar</p>
      </div>
      <div class="card stats">
        <p class="sub">Skor: <b id="score">0</b></p>
        <p class="sub">Nyawa: <b id="lives">3</b></p>
        <p class="sub">Kecepatan: <b id="speed">0</b></p>
      </div>
    </div><div id="msg" class="centerMsg">Kumpulkan semua orb hijau!</div>

<div class="controls">
  <div class="pad" aria-label="Kontrol arah">
    <div></div>
    <button class="btn" data-key="ArrowUp">▲</button>
    <div></div>
    <button class="btn" data-key="ArrowLeft">◀</button>
    <button class="btn" data-key="ArrowDown">●</button>
    <button class="btn" data-key="ArrowRight">▶</button>
    <div></div>
    <div></div>
    <div></div>
  </div>

  <div class="actionPanel">
    <button class="btn actionBtn" id="jumpBtn">Lompat</button>
    <button class="btn actionBtn" id="resetBtn">Reset</button>
    <div class="barWrap" aria-label="Health bar"><div id="hpBar" class="bar"></div></div>
  </div>
</div>

  </div>  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const speedEl = document.getElementById('speed');
    const msgEl = document.getElementById('msg');
    const hpBar = document.getElementById('hpBar');
    const resetBtn = document.getElementById('resetBtn');
    const jumpBtn = document.getElementById('jumpBtn');

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x09111f, 20, 120);

    const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const hemi = new THREE.HemisphereLight(0xbcdcff, 0x0a1020, 1.2);
    scene.add(hemi);

    const sun = new THREE.DirectionalLight(0xffffff, 1.8);
    sun.position.set(20, 30, 12);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.left = -40;
    sun.shadow.camera.right = 40;
    sun.shadow.camera.top = 40;
    sun.shadow.camera.bottom = -40;
    scene.add(sun);

    const groundGeo = new THREE.PlaneGeometry(200, 200, 20, 20);
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x15314d, roughness: 1, metalness: 0 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    const grid = new THREE.GridHelper(200, 40, 0x335577, 0x1a3550);
    grid.position.y = 0.02;
    scene.add(grid);

    const player = new THREE.Group();
    const body = new THREE.Mesh(
      new THREE.BoxGeometry(1.2, 1.7, 1.2),
      new THREE.MeshStandardMaterial({ color: 0x60a5fa, roughness: 0.65 })
    );
    body.castShadow = true;
    body.position.y = 0.85;
    player.add(body);

    const head = new THREE.Mesh(
      new THREE.SphereGeometry(0.45, 24, 24),
      new THREE.MeshStandardMaterial({ color: 0xf8fafc, roughness: 0.7 })
    );
    head.castShadow = true;
    head.position.y = 2.0;
    player.add(head);
    player.position.set(0, 0, 0);
    scene.add(player);

    const obstacles = [];
    const obstaclePositions = [
      [-8, 0, -6], [10, 0, -8], [7, 0, 9], [-12, 0, 8], [0, 0, 14], [15, 0, 2], [-16, 0, -14]
    ];

    obstaclePositions.forEach((p, i) => {
      const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(2.4, 2.4 + (i % 3), 2.4),
        new THREE.MeshStandardMaterial({ color: i % 2 ? 0xf87171 : 0x94a3b8, roughness: 0.8 })
      );
      mesh.position.set(p[0], p[1] + mesh.geometry.parameters.height / 2, p[2]);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);
      obstacles.push(mesh);
    });

    const coins = [];
    const coinPositions = [
      [-14, 1.2, 0], [-4, 1.2, 11], [6, 1.2, -13], [14, 1.2, 13], [-10, 1.2, -16], [18, 1.2, -2]
    ];

    const coinGeo = new THREE.TorusGeometry(0.7, 0.22, 12, 24);
    const coinMat = new THREE.MeshStandardMaterial({ color: 0x34d399, roughness: 0.35, metalness: 0.2 });

    coinPositions.forEach((p) => {
      const coin = new THREE.Mesh(coinGeo, coinMat.clone());
      coin.position.set(...p);
      coin.rotation.x = Math.PI / 2;
      coin.castShadow = true;
      scene.add(coin);
      coins.push(coin);
    });

    const boundary = 28;
    let keys = { up: false, down: false, left: false, right: false, jump: false };
    let score = 0;
    let lives = 3;
    let velocityY = 0;
    let grounded = true;
    let moveSpeed = 0.18;
    let targetCam = new THREE.Vector3();
    let camPos = new THREE.Vector3(0, 7, 12);
    let messageTimer = 0;

    const startPos = new THREE.Vector3(0, 0, 0);

    function setMessage(text, seconds = 1.5) {
      msgEl.textContent = text;
      msgEl.classList.add('show');
      messageTimer = seconds;
    }

    function updateStats() {
      scoreEl.textContent = score;
      livesEl.textContent = lives;
      speedEl.textContent = moveSpeed.toFixed(2);
      hpBar.style.transform = `scaleX(${Math.max(0, lives / 3)})`;
    }

    function resetGame() {
      player.position.copy(startPos);
      player.rotation.y = 0;
      velocityY = 0;
      grounded = true;
      score = 0;
      lives = 3;
      moveSpeed = 0.18;
      coins.forEach((c, i) => {
        c.visible = true;
        c.position.set(...coinPositions[i]);
      });
      setMessage('Mulai lagi! Kumpulkan semua orb hijau!', 2);
      updateStats();
    }

    function damagePlayer() {
      lives -= 1;
      updateStats();
      setMessage('Kena! Hindari balok merah.', 1.2);
      if (lives <= 0) {
        setMessage('Game Over. Tekan Reset.', 999);
        moveSpeed = 0;
      } else {
        player.position.copy(startPos);
        velocityY = 0;
        grounded = true;
      }
    }

    function intersectsXZ(a, b, radius = 1.3) {
      return Math.abs(a.x - b.x) < radius && Math.abs(a.z - b.z) < radius;
    }

    function handleMovement(delta) {
      const dir = new THREE.Vector3();
      if (keys.up) dir.z -= 1;
      if (keys.down) dir.z += 1;
      if (keys.left) dir.x -= 1;
      if (keys.right) dir.x += 1;
      if (dir.lengthSq() > 0) dir.normalize();

      if (dir.lengthSq() > 0) {
        const angle = Math.atan2(dir.x, dir.z);
        player.rotation.y = angle;
        const forward = new THREE.Vector3(Math.sin(angle), 0, Math.cos(angle));
        player.position.addScaledVector(forward, moveSpeed * delta * 60);
      }

      if (keys.jump && grounded) {
        velocityY = 0.32;
        grounded = false;
      }

      velocityY -= 0.018 * delta * 60;
      player.position.y += velocityY * delta * 60;
      if (player.position.y <= 0) {
        player.position.y = 0;
        velocityY = 0;
        grounded = true;
      }

      player.position.x = THREE.MathUtils.clamp(player.position.x, -boundary, boundary);
      player.position.z = THREE.MathUtils.clamp(player.position.z, -boundary, boundary);

      // Collision with obstacles
      for (const obs of obstacles) {
        if (Math.abs(player.position.x - obs.position.x) < 1.4 && Math.abs(player.position.z - obs.position.z) < 1.4) {
          player.position.x -= Math.sign(player.position.x - obs.position.x || 1) * 0.08;
          player.position.z -= Math.sign(player.position.z - obs.position.z || 1) * 0.08;
          if (Math.random() < 0.01) damagePlayer();
        }
      }

      // Collect coins
      for (const coin of coins) {
        if (coin.visible && player.position.distanceTo(coin.position) < 1.5) {
          coin.visible = false;
          score += 10;
          moveSpeed = Math.min(0.32, moveSpeed + 0.01);
          updateStats();
          setMessage('Orb terkumpul! +10', 0.8);
        }
      }

      if (score === coins.length * 10) {
        setMessage('Menang! Semua orb sudah dikumpulkan.', 999);
      }
    }

    function animate(t = 0) {
      const delta = Math.min(0.033, (animate.last ? (t - animate.last) / 1000 : 0.016));
      animate.last = t;

      handleMovement(delta);

      coins.forEach((coin, idx) => {
        if (coin.visible) {
          coin.rotation.z += 0.03;
          coin.position.y = coinPositions[idx][1] + Math.sin(t * 0.003 + idx) * 0.12;
        }
      });

      player.children.forEach((part, idx) => {
        if (idx === 1) part.position.y = 2.0 + Math.sin(t * 0.008) * 0.05;
      });

      targetCam.set(player.position.x, player.position.y + 4.5, player.position.z + 10);
      camPos.lerp(targetCam, 0.08);
      camera.position.copy(camPos);
      camera.lookAt(player.position.x, player.position.y + 1.2, player.position.z);

      if (messageTimer > 0 && messageTimer !== 999) {
        messageTimer -= delta;
        if (messageTimer <= 0) msgEl.classList.remove('show');
      }

      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    function setKey(name, state) {
      switch (name) {
        case 'ArrowUp': case 'w': case 'W': keys.up = state; break;
        case 'ArrowDown': case 's': case 'S': keys.down = state; break;
        case 'ArrowLeft': case 'a': case 'A': keys.left = state; break;
        case 'ArrowRight': case 'd': case 'D': keys.right = state; break;
        case ' ': keys.jump = state; break;
      }
    }

    window.addEventListener('keydown', (e) => {
      setKey(e.key, true);
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
    }, { passive: false });

    window.addEventListener('keyup', (e) => setKey(e.key, false));

    document.querySelectorAll('[data-key]').forEach((btn) => {
      const key = btn.dataset.key;
      const down = () => { setKey(key, true); btn.classList.add('active'); };
      const up = () => { setKey(key, false); btn.classList.remove('active'); };
      btn.addEventListener('pointerdown', down);
      btn.addEventListener('pointerup', up);
      btn.addEventListener('pointercancel', up);
      btn.addEventListener('pointerleave', up);
      btn.addEventListener('contextmenu', (e) => e.preventDefault());
    });

    jumpBtn.addEventListener('pointerdown', () => { keys.jump = true; jumpBtn.classList.add('active'); });
    jumpBtn.addEventListener('pointerup', () => { keys.jump = false; jumpBtn.classList.remove('active'); });
    jumpBtn.addEventListener('pointercancel', () => { keys.jump = false; jumpBtn.classList.remove('active'); });
    jumpBtn.addEventListener('pointerleave', () => { keys.jump = false; jumpBtn.classList.remove('active'); });
    resetBtn.addEventListener('click', resetGame);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateStats();
    setMessage('Kumpulkan semua orb hijau!', 2.5);
    animate();
  </script></body>
</html>
