<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belajar Bikin Karakter Game</title>
    <style>
        /* === RESET DASAR === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b1120;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }

        /* === AREA GAME === */
        .game-area {
            width: 600px;
            height: 400px;
            background: #1e293b;
            border-radius: 16px;
            border: 3px solid #38bdf8;
            position: relative; /* penting! supaya karakter bisa diatur posisinya */
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* === INI KARAKTERNYA === */
        .player {
            width: 50px;
            height: 50px;
            background: #facc15;
            border-radius: 12px; /* bikin agak melengkung, bisa diubah jadi 50% buat lingkaran */
            position: absolute;
            
            /* Posisi awal: tengah-tengah */
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            
            /* Hiasan biar keren */
            border: 3px solid white;
            box-shadow: 0 0 20px #facc15;
            
            /* Animasi transisi halus (nanti berguna pas gerak pakai JS) */
            transition: left 0.05s, top 0.05s;
        }

        /* === MATA KARAKTER (BIAR ADA EKSPRESI) === */
        .player::before,
        .player::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: #0b1120;
            border-radius: 50%;
            top: 12px;
        }

        .player::before {
            left: 10px;
        }

        .player::after {
            right: 10px;
        }

        /* === MULUT (SENYUM) === */
        .player .mouth {
            position: absolute;
            width: 20px;
            height: 8px;
            background: #0b1120;
            border-radius: 0 0 10px 10px;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* === TEKS INFO === */
        .info {
            margin-top: 20px;
            color: #94a3b8;
            text-align: center;
        }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <!-- Area Game -->
        <div class="game-area">
            <!-- Karakter Player -->
            <div class="player">
                <div class="mouth"></div>
            </div>
        </div>
        <div class="info">
            ⭐ Ini karakter kamu (posisi tengah)
        </div>
    </div>
</body>
</html>
