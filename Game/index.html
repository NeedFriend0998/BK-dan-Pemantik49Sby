<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Story Game 2D</title>
  <style>
    :root{
      --bg:#0f172a;
      --panel:rgba(15, 23, 42, .78);
      --text:#e2e8f0;
      --muted:#94a3b8;
      --accent:#38bdf8;
      --accent2:#22c55e;
      --danger:#ef4444;
      --border:rgba(255,255,255,.12);
      --shadow:0 20px 60px rgba(0,0,0,.35);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(circle at top, #1e293b 0%, #0f172a 45%, #020617 100%);
      color:var(--text);
      padding:16px;
    }

    .game{
      width:min(920px, 100%);
      min-height:92vh;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .badge{
      padding:10px 14px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.05);
      border-radius:999px;
      font-size:14px;
      color:var(--muted);
      backdrop-filter:blur(10px);
    }

    .stage{
      flex:1;
      border-radius:24px;
      overflow:hidden;
      position:relative;
      box-shadow:var(--shadow);
      border:1px solid var(--border);
      background:
        linear-gradient(to top, rgba(2,6,23,.9), rgba(2,6,23,.15)),
        radial-gradient(circle at center, #334155 0%, #0f172a 60%, #020617 100%);
      min-height:520px;
      display:flex;
      align-items:flex-end;
    }

    .stage::before{
      content:"";
      position:absolute;
      inset:0;
      background-size:cover;
      background-position:center;
      opacity:.22;
      transition:.35s ease;
      z-index:0;
    }

    .overlay{
      position:absolute;
      inset:0;
      z-index:1;
      display:flex;
      align-items:flex-end;
      padding:18px;
    }

    .panel{
      width:100%;
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:22px;
      padding:18px;
      backdrop-filter:blur(12px);
    }

    h1{
      margin:0 0 8px;
      font-size:clamp(22px, 4vw, 34px);
      line-height:1.2;
    }

    .story{
      margin:0;
      font-size:clamp(16px, 2.2vw, 19px);
      line-height:1.65;
      color:var(--text);
      min-height:90px;
      white-space:pre-wrap;
    }

    .choices{
      margin-top:16px;
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
      gap:10px;
    }

    button{
      border:none;
      border-radius:16px;
      padding:14px 16px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      transition:.2s ease;
    }

    button:hover{transform:translateY(-1px)}
    button:active{transform:translateY(1px)}

    .choice{
      background:linear-gradient(135deg, var(--accent), #2563eb);
      color:white;
      box-shadow:0 10px 24px rgba(37,99,235,.3);
    }

    .secondary{
      background:rgba(255,255,255,.08);
      color:var(--text);
      border:1px solid var(--border);
    }

    .danger{
      background:linear-gradient(135deg, var(--danger), #b91c1c);
      color:white;
      box-shadow:0 10px 24px rgba(239,68,68,.22);
    }

    .footer{
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }

    .mini{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .hint{
      color:var(--muted);
      font-size:13px;
      margin-top:10px;
    }

    @media (max-width: 640px){
      .stage{min-height:72vh}
      .panel{padding:16px}
      button{width:100%}
      .choices{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="game">
    <div class="topbar">
      <div class="badge" id="sceneLabel">Scene: mulai</div>
      <div class="badge" id="progressLabel">0/0 pilihan</div>
    </div>

    <div class="stage" id="stage">
      <div class="overlay">
        <div class="panel">
          <h1 id="title">Judul Game</h1>
          <p class="story" id="story">Klik mulai untuk memulai cerita.</p>

          <div class="choices" id="choices"></div>

          <div class="footer" style="margin-top:14px;">
            <div class="mini">
              <button class="secondary" onclick="restartGame()">Restart</button>
              <button class="secondary" onclick="saveGame()">Save</button>
              <button class="secondary" onclick="loadGame()">Load</button>
            </div>
            <div class="mini">
              <button class="danger" onclick="clearSave()">Hapus Save</button>
            </div>
          </div>

          <div class="hint">
            Kamu bisa edit isi cerita di bagian JavaScript, tepatnya di objek <b>scenes</b>.
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const scenes = {
      start: {
        title: "Petualangan di Kota Lama",
        text: "Kamu terbangun di sebuah kota tua yang penuh lampu kuning dan jalan sempit. Di depanmu ada dua arah: gang kecil yang sunyi, atau jalan utama yang ramai.",
        bg: "radial-gradient(circle at center, #475569 0%, #0f172a 65%, #020617 100%)",
        choices: [
          { text: "Masuk ke gang kecil", next: "alley" },
          { text: "Ikuti jalan utama", next: "mainroad" }
        ]
      },

      alley: {
        title: "Gang Kecil",
        text: "Gang itu tenang, tapi kamu melihat sebuah pintu kayu kecil dengan cahaya samar dari celahnya. Ada juga jalan keluar ke taman.",
        bg: "radial-gradient(circle at center, #1f2937 0%, #0f172a 70%, #020617 100%)",
        choices: [
          { text: "Buka pintu kayu", next: "room" },
          { text: "Pergi ke taman", next: "garden" }
        ]
      },

      mainroad: {
        title: "Jalan Utama",
        text: "Di jalan utama, kamu melihat papan petunjuk menuju perpustakaan tua dan jembatan kota. Angin malam terasa sejuk.",
        bg: "radial-gradient(circle at center, #334155 0%, #0f172a 70%, #020617 100%)",
        choices: [
          { text: "Ke perpustakaan", next: "library" },
          { text: "Ke jembatan", next: "bridge" }
        ]
      },

      room: {
        title: "Ruangan Rahasia",
        text: "Di dalam ruangan, ada meja kecil dengan peta kota dan sebuah kunci emas. Kamu berhasil menemukan petunjuk penting.",
        bg: "radial-gradient(circle at center, #3b2f5a 0%, #0f172a 70%, #020617 100%)",
        choices: [
          { text: "Ambil kunci dan lanjut", next: "ending1" },
          { text: "Kembali", next: "start" }
        ]
      },

      garden: {
        title: "Taman Sunyi",
        text: "Taman itu penuh bunga dan lampu taman. Di tengahnya ada bangku kosong dan suara air mancur yang tenang.",
        bg: "radial-gradient(circle at center, #14532d 0%, #0f172a 70%, #020617 100%)",
        choices: [
          { text: "Duduk sejenak", next: "ending2" },
          { text: "Kembali", next: "start" }
        ]
      },

      library: {
        title: "Perpustakaan Tua",
        text: "Rak buku tinggi menjulang. Kamu menemukan buku yang halaman pertamanya berisi peta rahasia kota.",
        bg: "radial-gradient(circle at center, #4c1d95 0%, #0f172a 70%, #020617 100%)",
        choices: [
          { text: "Baca lebih lanjut", next: "ending1" },
          { text: "Keluar", next: "start" }
        ]
      },

      bridge: {
        title: "Jembatan Kota",
        text: "Dari jembatan, kamu melihat seluruh kota menyala. Perjalananmu terasa seperti baru saja dimulai.",
        bg: "radial-gradient(circle at center, #0f766e 0%, #0f172a 70%, #020617 100%)",
        choices: [
          { text: "Lanjutkan petualangan", next: "ending2" },
          { text: "Kembali", next: "start" }
        ]
      },

      ending1: {
        title: "Ending Rahasia",
        text: "Kamu menemukan rahasia kota lama dan membuka jalan baru untuk petualangan berikutnya. Tamat.",
        bg: "radial-gradient(circle at center, #f59e0b 0%, #0f172a 70%, #020617 100%)",
        choices: [
          { text: "Main lagi", next: "start" }
        ]
      },

      ending2: {
        title: "Ending Tenang",
        text: "Kamu memilih jalan yang damai. Malam terasa hangat dan petualangan berakhir dengan tenang. Tamat.",
        bg: "radial-gradient(circle at center, #14b8a6 0%, #0f172a 70%, #020617 100%)",
        choices: [
          { text: "Main lagi", next: "start" }
        ]
      }
    };

    let currentScene = "start";
    let choiceCount = 0;

    const titleEl = document.getElementById("title");
    const storyEl = document.getElementById("story");
    const choicesEl = document.getElementById("choices");
    const stageEl = document.getElementById("stage");
    const sceneLabelEl = document.getElementById("sceneLabel");
    const progressLabelEl = document.getElementById("progressLabel");

    function renderScene(id){
      const scene = scenes[id];
      if(!scene) return;

      currentScene = id;
      titleEl.textContent = scene.title;
      storyEl.textContent = scene.text;
      sceneLabelEl.textContent = "Scene: " + id;
      stageEl.style.background = scene.bg;

      choicesEl.innerHTML = "";
      scene.choices.forEach(choice => {
        const btn = document.createElement("button");
        btn.className = "choice";
        btn.textContent = choice.text;
        btn.onclick = () => {
          choiceCount++;
          progressLabelEl.textContent = `${choiceCount} pilihan`;
          renderScene(choice.next);
        };
        choicesEl.appendChild(btn);
      });
    }

    function restartGame(){
      choiceCount = 0;
      progressLabelEl.textContent = "0 pilihan";
      renderScene("start");
    }

    function saveGame(){
      localStorage.setItem("storyGameSave", JSON.stringify({
        currentScene,
        choiceCount
      }));
      alert("Game tersimpan.");
    }

    function loadGame(){
      const saved = localStorage.getItem("storyGameSave");
      if(!saved){
        alert("Belum ada save.");
        return;
      }
      const data = JSON.parse(saved);
      currentScene = data.currentScene || "start";
      choiceCount = data.choiceCount || 0;
      progressLabelEl.textContent = `${choiceCount} pilihan`;
      renderScene(currentScene);
    }

    function clearSave(){
      localStorage.removeItem("storyGameSave");
      alert("Save dihapus.");
    }

    renderScene("start");
  </script>
</body>
</html>
